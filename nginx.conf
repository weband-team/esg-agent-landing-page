server {
    server_name esgsyncpro.qirelab.com;

    # Regulations Search backend (NestJS) — exposes /api/lookup/* (SSE) and
    # /api/pdf/*. These must be proxied to port 3001 so the browser can reach
    # the backend over HTTPS on the same origin (the rest of /api/ stays with
    # the Next.js app: /api/deposit, /api/deposits, /api/regulations-search/...).
    location ~ ^/api/(lookup|pdf)/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Server-Sent Events (SSE) streaming support for /api/lookup/progress
        proxy_set_header X-Accel-Buffering no;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        proxy_pass http://localhost:5743;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    error_log /var/log/nginx/esgsync.error.log;
    access_log /var/log/nginx/esgsync.access.log;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/esgsyncpro.qirelab.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/esgsyncpro.qirelab.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = esgsyncpro.qirelab.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name esgsyncpro.qirelab.com;
    return 404; # managed by Certbot

}
