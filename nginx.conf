server {
    server_name esgsyncpro.qirelab.com;

    location / {
        proxy_pass http://localhost:5743;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    error_log /var/log/nginx/esgsync.error.log;
    access_log /var/log/nginx/esgsync.access.log;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/esgsyncpro.qirelab.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/esgsyncpro.qirelab.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = esgsyncpro.qirelab.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name esgsyncpro.qirelab.com;
    return 404; # managed by Certbot

}
