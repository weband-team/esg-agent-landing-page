name: Deploy esg-agent-landing-page to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Security audit
        run: npm audit --audit-level=critical
        continue-on-error: false

      - name: Build Next.js project
        env:
          # Empty = the browser uses the same origin; Nginx proxies
          # /api/lookup and /api/pdf to the backend. Inlined at build time.
          NEXT_PUBLIC_REGULATIONS_API_URL: ''
        run: npm run build

      - name: Install Regulations Search backend dependencies
        working-directory: regulations-search
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client and compile backend
        working-directory: regulations-search/backend
        env:
          DATABASE_URL: "file:./dev.db"
        run: |
          npm run db:generate
          npm run build

      - name: Prepare deployment archive
        run: |
          echo "Creating deployment directory..."
          mkdir -p deploy

          echo "Creating archive with all project files..."
          tar -czf deploy/esg-agent-landing-page.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='deploy' \
            .

          echo "Archive created successfully!"
          ls -lh deploy/

      - name: Copy archive to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "deploy/esg-agent-landing-page.tar.gz"
          target: "/tmp/"
          strip_components: 1

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            echo "Starting deployment..."

            DEPLOY_DIR="/var/www/esg-agent-landing-page"
            PM2_NAME="esg-agent-landing-page"
            ARCHIVE_NAME="esg-agent-landing-page.tar.gz"
            APP_PORT=5743

            # Regulations Search backend (NestJS)
            BACKEND_DIR="$DEPLOY_DIR/regulations-search/backend"
            BACKEND_PM2_NAME="esg-regulations-backend"
            BACKEND_PORT=3001

            echo "Deploy directory: $DEPLOY_DIR"
            echo "PM2 process name: $PM2_NAME"
            echo "Archive name: $ARCHIVE_NAME"
            echo "App port: $APP_PORT"
            echo "Backend PM2 process name: $BACKEND_PM2_NAME"
            echo "Backend port: $BACKEND_PORT"

            # Preserve SQLite database across deploys
            if [ -f "$DEPLOY_DIR/deposits.db" ]; then
              echo "Backing up existing SQLite database..."
              cp "$DEPLOY_DIR/deposits.db" /tmp/deposits.db.bak
            fi

            # Preserve Regulations Search backend SQLite database across deploys
            if [ -f "$BACKEND_DIR/dev.db" ]; then
              echo "Backing up Regulations backend SQLite database..."
              cp "$BACKEND_DIR/dev.db" /tmp/regulations-dev.db.bak
            fi

            # Clean up old deployment
            echo "Cleaning old deployment..."
            rm -rf $DEPLOY_DIR
            mkdir -p $DEPLOY_DIR

            # Extract archive
            echo "Extracting archive..."
            tar -xzf /tmp/$ARCHIVE_NAME -C $DEPLOY_DIR/

            # Clean up archive
            rm -f /tmp/$ARCHIVE_NAME

            # Restore SQLite database
            if [ -f /tmp/deposits.db.bak ]; then
              echo "Restoring SQLite database..."
              mv /tmp/deposits.db.bak "$DEPLOY_DIR/deposits.db"
            fi

            # Restore Regulations Search backend SQLite database
            if [ -f /tmp/regulations-dev.db.bak ]; then
              echo "Restoring Regulations backend SQLite database..."
              mv /tmp/regulations-dev.db.bak "$BACKEND_DIR/dev.db"
            fi

            # Navigate to project directory
            cd $DEPLOY_DIR

            # PM2 deployment
            echo "Managing PM2 process..."
            if pm2 describe $PM2_NAME > /dev/null 2>&1; then
              echo "Stopping existing PM2 process..."
              pm2 delete $PM2_NAME
            fi

            echo "Starting PM2 process on port $APP_PORT..."
            PORT=$APP_PORT pm2 start npm --name $PM2_NAME -- run start

            # Verify the process is running
            pm2 show $PM2_NAME

            # ── Regulations Search backend (NestJS) ──────────────────────
            echo "Setting up Regulations Search backend..."
            cd "$BACKEND_DIR"

            # The backend .env is kept out of git, so write it on the host.
            echo "Writing backend environment file..."
            cat > .env <<EOF
            DATABASE_URL="file:./dev.db"
            PORT=$BACKEND_PORT
            EOF

            # Apply migrations; seed only on the first deploy (no DB restored yet).
            if [ -f ./dev.db ]; then
              echo "Existing backend database found — applying migrations only..."
              npm run db:deploy
            else
              echo "No backend database — creating, migrating and seeding..."
              npm run db:deploy
              npm run db:seed
            fi

            # (Re)start the backend under PM2
            echo "Managing backend PM2 process..."
            if pm2 describe $BACKEND_PM2_NAME > /dev/null 2>&1; then
              echo "Stopping existing backend PM2 process..."
              pm2 delete $BACKEND_PM2_NAME
            fi

            echo "Starting backend PM2 process on port $BACKEND_PORT..."
            DATABASE_URL="file:./dev.db" PORT=$BACKEND_PORT NODE_ENV=production \
              pm2 start dist/src/main.js --name $BACKEND_PM2_NAME

            # Verify the backend process is running
            pm2 show $BACKEND_PM2_NAME

            # Back to project root
            cd $DEPLOY_DIR

            # Configure PM2 to start on system boot
            echo "Configuring PM2 startup..."
            pm2 startup || true

            # Save PM2 process list
            echo "Saving PM2 process list..."
            pm2 save

            # Show PM2 status
            pm2 list

            echo "Deployment completed successfully!"
