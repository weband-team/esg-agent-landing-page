<script>
    // Header-specific JavaScript functions

    // Change language function (local implementation)
    function changeLanguageLocal(lang) {
        // Fallback: update language display and save to localStorage
        const currentLanguageElement = document.getElementById('current-language');
        const mobileCurrentLanguageElement = document.getElementById('mobile-current-language');
        
        if (currentLanguageElement) {
            currentLanguageElement.textContent = lang === 'en' ? 'English' : 'Polish';
        }
        
        if (mobileCurrentLanguageElement) {
            mobileCurrentLanguageElement.textContent = lang === 'en' ? 'English' : 'Polish';
        }
        
        // Save language to localStorage
        localStorage.setItem('esgsyncp-language', lang);
        
        // Update URL with language parameter
        const url = new URL(window.location);
        url.searchParams.set('lang', lang);
        window.history.pushState({}, '', url);
        
        // Try to update translations if available
        if (typeof updateTranslations === 'function') {
            updateTranslations();
        }
        
        // Also try updatePageLanguage if available (for index.html)
        if (typeof updatePageLanguage === 'function') {
            updatePageLanguage();
        }
        
        if (typeof window.toggleLanguageDropdown === 'function') {
            window.toggleLanguageDropdown();
        } else {
            toggleLanguageDropdown();
        }
    }
    
    // Local changeLanguage function (will be wrapped)
    function changeLanguage(lang) {
        // This function is replaced by changeLanguageWrapper above
        // Fallback to local implementation
        changeLanguageLocal(lang);
    }
    
    // Toggle language dropdown
    function toggleLanguageDropdown() {
        // Use global function if available, otherwise use local
        if (typeof window.toggleLanguageDropdown === 'function' && window.toggleLanguageDropdown !== toggleLanguageDropdown) {
            window.toggleLanguageDropdown();
            return;
        }
        
        const dropdown = document.getElementById('language-dropdown');
        const mobileDropdown = document.getElementById('mobile-language-dropdown');
        const arrow = document.getElementById('language-arrow');
        const mobileArrow = document.getElementById('mobile-language-arrow');
        
        if (dropdown && arrow) {
            const isVisible = dropdown.style.opacity === '1' && dropdown.style.visibility === 'visible';
            
            if (isVisible) {
                // Close dropdown
                dropdown.style.opacity = '0';
                dropdown.style.visibility = 'hidden';
                dropdown.style.transform = 'translateY(-10px)';
                arrow.style.transform = 'rotate(0deg)';
            } else {
                // Open dropdown
                dropdown.style.opacity = '1';
                dropdown.style.visibility = 'visible';
                dropdown.style.transform = 'translateY(0)';
                arrow.style.transform = 'rotate(180deg)';
            }
        }
        
        if (mobileDropdown && mobileArrow) {
            const isVisible = mobileDropdown.style.opacity === '1' && mobileDropdown.style.visibility === 'visible';
            
            if (isVisible) {
                // Close mobile dropdown
                mobileDropdown.style.opacity = '0';
                mobileDropdown.style.visibility = 'hidden';
                mobileDropdown.style.transform = 'translateY(-10px)';
                mobileArrow.style.transform = 'rotate(0deg)';
            } else {
                // Open mobile dropdown
                mobileDropdown.style.opacity = '1';
                mobileDropdown.style.visibility = 'visible';
                mobileDropdown.style.transform = 'translateY(0)';
                mobileArrow.style.transform = 'rotate(180deg)';
            }
        }
    }
    
    // Close all language dropdowns
    function closeAllLanguageDropdowns() {
        // Use global function if available, otherwise use local
        if (typeof window.closeAllLanguageDropdowns === 'function' && window.closeAllLanguageDropdowns !== closeAllLanguageDropdowns) {
            window.closeAllLanguageDropdowns();
            return;
        }
        
        const dropdown = document.getElementById('language-dropdown');
        const mobileDropdown = document.getElementById('mobile-language-dropdown');
        const arrow = document.getElementById('language-arrow');
        const mobileArrow = document.getElementById('mobile-language-arrow');
        
        if (dropdown && arrow) {
            dropdown.style.opacity = '0';
            dropdown.style.visibility = 'hidden';
            dropdown.style.transform = 'translateY(-10px)';
            arrow.style.transform = 'rotate(0deg)';
        }
        
        if (mobileDropdown && mobileArrow) {
            mobileDropdown.style.opacity = '0';
            mobileDropdown.style.visibility = 'hidden';
            mobileDropdown.style.transform = 'translateY(-10px)';
            mobileArrow.style.transform = 'rotate(0deg)';
        }
    }
    
    // Toggle mobile menu
    function toggleMobileMenu() {
        const menu = document.getElementById('mobile-menu');
        const overlay = document.getElementById('mobile-menu-overlay');
        const burgerButton = document.getElementById('mobile-menu-button');
        
        if (!menu || !overlay) {
            console.warn('Mobile menu elements not found');
            return;
        }
        
        const isOpen = menu.classList.contains('open');
        
        if (isOpen) {
            // Close menu
            menu.classList.remove('open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            
            // Reset burger icon
            if (burgerButton) {
                const lines = burgerButton.querySelectorAll('span');
                lines.forEach((line, index) => {
                    line.style.transform = '';
                    if (index === 1) {
                        line.style.opacity = '1';
                    }
                });
            }
        } else {
            // Open menu
            menu.classList.add('open');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // Transform burger icon to X
            if (burgerButton) {
                const lines = burgerButton.querySelectorAll('span');
                if (lines.length >= 3) {
                    lines[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
                    lines[1].style.opacity = '0';
                    lines[2].style.transform = 'rotate(-45deg) translate(7px, -6px)';
                }
            }
        }
    }
    
    // Make functions globally available immediately - BEFORE DOMContentLoaded
    window.toggleMobileMenu = toggleMobileMenu;
    
    // For changeLanguage: we need a wrapper that always calls the page's function
    // Save page's function BEFORE we assign our wrapper
    const savedPageChangeLanguage = (typeof window.changeLanguage === 'function') ? window.changeLanguage : null;
    
    // Store it so wrapper can call it
    if (savedPageChangeLanguage) {
        window._pageChangeLanguage = savedPageChangeLanguage;
    }
    
    // Create wrapper function
    const changeLanguageWrapper = function(lang) {
        // First, try to get the page's function from saved reference
        let pageFunction = window._pageChangeLanguage;
        
        // If no saved function, try to get it from current window.changeLanguage
        // (in case page function was defined after header script ran)
        if (!pageFunction) {
            const currentFunc = window.changeLanguage;
            if (currentFunc && typeof currentFunc === 'function' && currentFunc !== changeLanguageWrapper) {
                pageFunction = currentFunc;
                window._pageChangeLanguage = currentFunc;
            }
        }
        
        // Call page function if available
        if (pageFunction && typeof pageFunction === 'function' && pageFunction !== changeLanguageWrapper) {
            pageFunction(lang);
            // Close dropdown
            if (typeof window.toggleLanguageDropdown === 'function') {
                window.toggleLanguageDropdown();
            } else {
                toggleLanguageDropdown();
            }
        } else {
            // Fallback to local implementation
            changeLanguageLocal(lang);
        }
    };
    
    // Assign wrapper, but page will restore its function after eval()
    // When page restores, it should also update window._pageChangeLanguage
    window.changeLanguage = changeLanguageWrapper;
    
    window.toggleLanguageDropdown = toggleLanguageDropdown;
    window.closeAllLanguageDropdowns = closeAllLanguageDropdowns;
    
    // Close language dropdowns when clicking outside
    document.addEventListener('click', function(event) {
        const languageSelector = document.getElementById('language-selector');
        const languageDropdown = document.getElementById('language-dropdown');
        const mobileLanguageSelector = document.getElementById('mobile-language-selector');
        const mobileLanguageDropdown = document.getElementById('mobile-language-dropdown');
        
        if (languageSelector && languageDropdown && 
            !languageSelector.contains(event.target) && 
            !languageDropdown.contains(event.target)) {
            closeAllLanguageDropdowns();
        }
        
        if (mobileLanguageSelector && mobileLanguageDropdown && 
            !mobileLanguageSelector.contains(event.target) && 
            !mobileLanguageDropdown.contains(event.target)) {
            closeAllLanguageDropdowns();
        }
    });
    
    // Function to setup mobile menu event handlers
    function setupMobileMenuHandlers() {
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenuClose = document.getElementById('mobile-menu-close');
        const mobileOverlay = document.getElementById('mobile-menu-overlay');
        const mobileMenuLinks = document.querySelectorAll('.mobile-menu-nav-item, .mobile-menu-cta a');
        
        if (mobileMenuButton) {
            mobileMenuButton.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                if (typeof window.toggleMobileMenu === 'function') {
                    window.toggleMobileMenu();
                }
            };
        }
        
        if (mobileMenuClose) {
            mobileMenuClose.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                if (typeof window.toggleMobileMenu === 'function') {
                    window.toggleMobileMenu();

        // Setup language selector handlers
        const mobileLanguageSelector = document.getElementById('mobile-language-selector');

        const mobileLangOptionPl = document.getElementById('mobile-lang-option-pl');
        
        if (mobileLanguageSelector) {
            mobileLanguageSelector.onclick = function(e) {
                e.preventDefault();

                    window.toggleLanguageDropdown();

                    toggleLanguageDropdown();

            };
        }
        
        if (mobileLangOptionEn) {
            mobileLangOptionEn.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                if (typeof window.changeLanguage === 'function') {
                    window.changeLanguage('en');
                } else if (typeof changeLanguage === 'function') {
                    changeLanguage('en');

            };
        }
        
        if (mobileLangOptionPl) {
            mobileLangOptionPl.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                if (typeof window.changeLanguage === 'function') {
                    window.changeLanguage('pl');
                } else if (typeof changeLanguage === 'function') {
                    changeLanguage('pl');
                }
            };
        }
        
        // Setup desktop header language selector handlers
        const languageSelector = document.getElementById('language-selector');
        const langOptionEn = document.getElementById('lang-option-en');
        const langOptionPl = document.getElementById('lang-option-pl');
        
        if (languageSelector) {
            languageSelector.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                if (typeof window.toggleLanguageDropdown === 'function') {
                    window.toggleLanguageDropdown();
                } else if (typeof toggleLanguageDropdown === 'function') {
                    toggleLanguageDropdown();
                }
            };
        }
        
        if (langOptionEn) {
            langOptionEn.onclick = function(e) {
                e.preventDefault();
                e.stopPropagation();
                if (typeof window.changeLanguage === 'function') {
                    window.changeLanguage('en');

        if (langOptionPl) {

                    window.changeLanguage('pl');
                } else if (typeof changeLanguage === 'function') {
                    changeLanguage('pl');
                }
            };
        }
    }
    
    // Make setup function globally available
    window.setupMobileMenuHandlers = setupMobileMenuHandlers;
    
    // Initialize header after load
    document.addEventListener('DOMContentLoaded', function() {
        // Re-initialize feather icons
        if (typeof feather !== 'undefined') {
            feather.replace();
        }
        
        // Setup mobile menu handlers
        setupMobileMenuHandlers();
        
        // Ensure dropdowns are closed on load
        setTimeout(() => {
            closeAllLanguageDropdowns();
        }, 100);
        
        // Ensure mobile menu button is visible on mobile
        function updateMobileMenuVisibility() {
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');
            const mobileOverlay = document.getElementById('mobile-menu-overlay');
            
            if (window.innerWidth < 1024) {
                // Mobile view
                if (mobileMenuButton) {
                    mobileMenuButton.style.display = 'flex';
                    mobileMenuButton.style.visibility = 'visible';
                }
                if (mobileMenu) {
                    mobileMenu.style.display = 'flex';
                }
                if (mobileOverlay) {
                    mobileOverlay.style.display = 'block';
                }
            } else {
                // Desktop view
                if (mobileMenuButton) {
                    mobileMenuButton.style.display = 'none';
                    mobileMenuButton.style.visibility = 'hidden';
                }
                if (mobileMenu) {
                    mobileMenu.style.display = 'none';
                }
                if (mobileOverlay) {
                    mobileOverlay.style.display = 'none';
                }
            }
        }
        
        // Update on load
        updateMobileMenuVisibility();
        
        // Update on resize
        window.addEventListener('resize', updateMobileMenuVisibility);
    });
</script>
